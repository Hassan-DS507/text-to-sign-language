<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>وصال — Sign Language Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #05050d;
  --ink:      #0a0a18;
  --card:     #0d0d1f;
  --rim:      #ffffff08;
  --accent:   #a78bfa;
  --hot:      #f472b6;
  --teal:     #2dd4bf;
  --amber:    #fbbf24;
  --text:     #f1f0ff;
  --muted:    #6b6b9a;
  --r:        #f472b6;
  --l:        #818cf8;
  --p:        #2dd4bf;
  --face:     #fb923c;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* noise grain */
body::after {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 200px;
  opacity: .6;
}

/* ambient orbs */
.orb {
  position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; z-index:0;
}
.orb1 { width:500px;height:500px;top:-150px;left:-100px;background:rgba(167,139,250,.08); }
.orb2 { width:400px;height:400px;bottom:-100px;right:-80px;background:rgba(244,114,182,.07); }
.orb3 { width:300px;height:300px;top:40%;left:40%;background:rgba(45,212,191,.05); }

.wrap {
  position: relative; z-index:1;
  max-width: 1000px;
  margin: 0 auto;
  padding: 28px 20px 60px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--rim);
}
.brand { font-family:'Syne',sans-serif; }
.brand-name {
  font-size: 2.4rem;
  font-weight: 800;
  letter-spacing: -1.5px;
  background: linear-gradient(130deg, var(--accent) 0%, var(--hot) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip:text;
}
.brand-sub { font-size:.82rem; color:var(--muted); margin-top:2px; }

.pulse-dot {
  width:10px;height:10px;border-radius:50%;background:var(--teal);
  box-shadow:0 0 0 0 rgba(45,212,191,.5);
  animation: pulse-ring 2s infinite;
}
@keyframes pulse-ring {
  0%  { box-shadow:0 0 0 0   rgba(45,212,191,.5); }
  70% { box-shadow:0 0 0 10px rgba(45,212,191,0); }
  100%{ box-shadow:0 0 0 0   rgba(45,212,191,0); }
}

/* ── INPUT AREA ── */
.input-zone {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: start;
}
.input-wrap {
  background: var(--card);
  border: 1px solid var(--rim);
  border-radius: 16px;
  padding: 4px 4px 4px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: border-color .2s;
}
.input-wrap:focus-within { border-color: rgba(167,139,250,.4); }
.input-wrap input {
  flex:1; background:none; border:none; outline:none;
  color:var(--text); font-family:'Cairo',sans-serif; font-size:1rem;
  padding: 12px 0;
}
.input-wrap input::placeholder { color:var(--muted); }
.go-btn {
  background: linear-gradient(135deg, var(--accent), var(--hot));
  border: none; border-radius: 12px;
  padding: 13px 22px;
  color: #fff; font-family:'Syne',sans-serif; font-size:.9rem; font-weight:700;
  cursor:pointer; transition: all .2s; white-space:nowrap;
  letter-spacing:.3px;
}
.go-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(167,139,250,.35); }
.go-btn:active { transform:translateY(0); }
.go-btn:disabled { opacity:.3; cursor:not-allowed; transform:none; box-shadow:none; }

/* word chips */
.chips { display:flex; flex-wrap:wrap; gap:7px; }
.chip {
  font-size:.75rem; padding:5px 14px; border-radius:20px;
  border: 1px solid var(--rim); color:var(--muted);
  cursor:pointer; transition:all .15s; background:var(--card);
  font-family:'Syne',sans-serif; letter-spacing:.3px;
}
.chip:hover { border-color:var(--accent); color:var(--accent); background:rgba(167,139,250,.08); }

/* ── GLOSS STRIP ── */
.gloss-strip {
  display:flex; flex-wrap:wrap; gap:8px; min-height:38px; align-items:center;
}
.gw {
  font-family:'Syne',sans-serif; font-size:.8rem; font-weight:700;
  padding:6px 16px; border-radius:99px;
  border:1.5px solid var(--rim); color:var(--muted);
  transition: all .3s cubic-bezier(.34,1.56,.64,1);
  letter-spacing:.5px; text-transform:uppercase;
}
.gw.found  { border-color:rgba(45,212,191,.5); color:var(--teal); }
.gw.miss   { border-color:rgba(244,114,182,.3); color:var(--hot); opacity:.45; text-decoration:line-through; }
.gw.active {
  border-color:var(--amber); color:#000; background:var(--amber);
  transform:scale(1.12) translateY(-2px);
  box-shadow: 0 6px 24px rgba(251,191,36,.4);
}

/* ── STAGE ── */
.stage {
  background: var(--card);
  border: 1px solid var(--rim);
  border-radius: 24px;
  overflow: hidden;
  position: relative;
}

/* top bar inside stage */
.stage-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--rim);
  background: rgba(255,255,255,.02);
  flex-wrap:wrap; gap:10px;
}
.now-sign {
  font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:800;
  color: var(--amber); min-width:120px; letter-spacing:-.5px;
}
.ctrl-row { display:flex; gap:8px; align-items:center; }
.spd-btn {
  background:none; border:1px solid var(--rim); border-radius:8px;
  padding:5px 13px; color:var(--muted); font-family:'Syne',sans-serif;
  font-size:.75rem; cursor:pointer; transition:all .13s; letter-spacing:.5px;
}
.spd-btn.on { border-color:var(--accent); color:var(--accent); background:rgba(167,139,250,.1); }
.icon-btn {
  background:none; border:1px solid var(--rim); border-radius:8px;
  width:34px;height:34px; color:var(--muted); cursor:pointer;
  transition:all .13s; display:flex; align-items:center; justify-content:center; font-size:.9rem;
}
.icon-btn:hover { border-color:var(--accent); color:var(--accent); }

/* canvas container */
.canvas-outer {
  position:relative;
  background: radial-gradient(ellipse at 50% 40%, #0e0e28 0%, #05050d 100%);
}
canvas#mainCanvas { display:block; width:100%; }

/* overlaid word label */
#wordLabel {
  position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
  font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:800;
  letter-spacing:2px; text-transform:uppercase;
  color:var(--amber);
  text-shadow: 0 0 30px rgba(251,191,36,.6), 0 2px 4px rgba(0,0,0,.8);
  pointer-events:none;
  transition: opacity .2s;
  opacity:0;
}
#wordLabel.show { opacity:1; }

/* progress */
.progress-outer {
  padding: 12px 20px 16px;
  border-top: 1px solid var(--rim);
  display:flex; flex-direction:column; gap:6px;
}
.prog-track {
  height:3px; background:rgba(255,255,255,.06); border-radius:99px; overflow:hidden;
}
.prog-fill {
  height:100%; width:0%;
  background: linear-gradient(90deg, var(--accent), var(--hot));
  border-radius:99px;
  transition: width .04s linear;
}
.prog-labels {
  display:flex; justify-content:space-between;
  font-size:.7rem; color:var(--muted); font-family:'Syne',sans-serif; letter-spacing:.5px;
}

/* legend */
.legend {
  display:flex; gap:16px; flex-wrap:wrap;
  padding: 14px 20px;
  border-top: 1px solid var(--rim);
  background: rgba(255,255,255,.015);
}
.li { display:flex; align-items:center; gap:6px; font-size:.72rem; color:var(--muted); font-family:'Syne',sans-serif; letter-spacing:.3px; }
.ld { width:22px;height:3px;border-radius:99px; }

/* toast */
.toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(70px);
  background:var(--card); border:1px solid rgba(167,139,250,.3);
  border-radius:12px; padding:10px 22px;
  font-size:.82rem; color:var(--accent);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  z-index:999; pointer-events:none;
}
.toast.show { transform:translateX(-50%) translateY(0); }

@media(max-width:560px){
  .input-zone{ grid-template-columns:1fr; }
  .brand-name{ font-size:1.8rem; }
}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="wrap">

  <!-- header -->
  <header>
    <div class="brand">
      <div class="brand-name">🤟 وصال</div>
      <div class="brand-sub">Sign Language Visualizer · لغة الإشارة</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="pulse-dot"></div>
      <span id="statusTxt" style="font-size:.75rem;color:var(--muted);font-family:'Syne',sans-serif">READY</span>
    </div>
  </header>

  <!-- input -->
  <div style="display:flex;flex-direction:column;gap:10px">
    <div class="input-zone">
      <div class="input-wrap">
        <span style="font-size:1rem;color:var(--muted)">✏️</span>
        <input id="inp" type="text" placeholder="اكتب كلمة أو جملة... (مثال: drink book sleep)"
               onkeydown="if(event.key==='Enter')go()"/>
      </div>
      <button class="go-btn" id="btnGo" onclick="go()">SIGN IT ▶</button>
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <!-- gloss -->
  <div class="gloss-strip" id="glossStrip">
    <span style="font-size:.8rem;color:var(--muted);font-family:'Syne',sans-serif;letter-spacing:.5px">
      WAITING FOR INPUT...
    </span>
  </div>

  <!-- stage -->
  <div class="stage">

    <div class="stage-bar">
      <div class="now-sign" id="nowSign">—</div>
      <div class="ctrl-row">
        <button class="spd-btn on" id="s1"  onclick="setSpd(1)">1×</button>
        <button class="spd-btn"   id="s05" onclick="setSpd(.5)">½×</button>
        <button class="spd-btn"   id="s2"  onclick="setSpd(2)">2×</button>
        <button class="icon-btn" onclick="replay()" id="btnRep" title="إعادة">↺</button>
        <button class="icon-btn" onclick="stopAnim()" title="إيقاف">◼</button>
      </div>
    </div>

    <div class="canvas-outer">
      <canvas id="mainCanvas" width="960" height="520"></canvas>
      <div id="wordLabel"></div>
    </div>

    <div class="progress-outer">
      <div class="prog-track"><div class="prog-fill" id="pfill"></div></div>
      <div class="prog-labels">
        <span id="finfo">FRAME — / —</span>
        <span id="tinfo">0.00s / 0.00s</span>
      </div>
    </div>

    <div class="legend">
      <div class="li"><div class="ld" style="background:var(--r)"></div>RIGHT HAND</div>
      <div class="li"><div class="ld" style="background:var(--l)"></div>LEFT HAND</div>
      <div class="li"><div class="ld" style="background:var(--p)"></div>BODY</div>
      <div class="li"><div class="ld" style="background:var(--face)"></div>FACE</div>
    </div>

  </div>

</div>
<div class="toast" id="toast"></div>

// ══════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════
const FPS = 30;
const HAND_CONN = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17]
];
const POSE_CONN = [[5,6],[5,7],[7,9],[6,8],[8,10]];

// colour palette
const C = {
  r:'#f472b6', r2:'#fda4d4', rg:'rgba(244,114,182,',
  l:'#818cf8', l2:'#a5b4fc', lg:'rgba(129,140,248,',
  p:'#2dd4bf', p2:'#5eead4',
  face:'#fb923c', eye:'#93c5fd',
  amber:'#fbbf24',
};

// ══════════════════════════════════════════════
//  CANVAS SETUP
// ══════════════════════════════════════════════
const canvas = document.getElementById('mainCanvas');
const cx     = canvas.getContext('2d');
const CW = 960, CH = 520;
canvas.width = CW; canvas.height = CH;

// ── coordinate mapping ──
// landmarks normalised around 0, range roughly -4..+5 in y
// we map to canvas with padding
function toScreen(x, y) {
  // centre of figure in canvas
  const ox = CW / 2;
  const oy = CH * 0.42;
  const scale = 62;
  return [ox + x * scale, oy + y * scale];
}

// ── draw helpers ──
function bone(pts, i, j, color, lw, alpha=.85) {
  const a = pts[i], b = pts[j];
  if (!a||!b||a[0]==null||b[0]==null) return;
  const [ax,ay] = toScreen(a[0],a[1]);
  const [bx,by] = toScreen(b[0],b[1]);
  cx.save();
  cx.beginPath(); cx.moveTo(ax,ay); cx.lineTo(bx,by);
  cx.strokeStyle = color; cx.lineWidth = lw;
  cx.lineCap = 'round'; cx.globalAlpha = alpha;
  cx.stroke(); cx.restore();
}

function joint(pt, color, r, alpha=.95) {
  if (!pt||pt[0]==null) return;
  const [x,y] = toScreen(pt[0],pt[1]);
  cx.save();
  cx.beginPath(); cx.arc(x,y,r,0,Math.PI*2);
  cx.fillStyle = color; cx.globalAlpha = alpha; cx.fill(); cx.restore();
}

function glowDot(pt, color, r=18) {
  if (!pt||pt[0]==null) return;
  const [x,y] = toScreen(pt[0],pt[1]);
  const g = cx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0, color+'70)');
  g.addColorStop(1, color+'00)');
  cx.save(); cx.fillStyle=g;
  cx.beginPath(); cx.arc(x,y,r,0,Math.PI*2); cx.fill(); cx.restore();
}

function trail(history, color, maxLen=8) {
  // draw motion trail for wrist
  if (history.length < 2) return;
  for (let i=1; i<history.length; i++) {
    const a=history[i-1], b=history[i];
    if(!a||!b) continue;
    const [ax,ay]=toScreen(a[0],a[1]), [bx,by]=toScreen(b[0],b[1]);
    const alpha = (i/history.length) * 0.35;
    cx.save();
    cx.beginPath(); cx.moveTo(ax,ay); cx.lineTo(bx,by);
    cx.strokeStyle=color; cx.lineWidth=2+(i/history.length)*3;
    cx.lineCap='round'; cx.globalAlpha=alpha; cx.stroke(); cx.restore();
  }
}

// ── draw one full frame ──
const rhTrail=[], lhTrail=[];
const TRAIL_LEN = 10;

function drawFrame(frame, wordName) {
  cx.clearRect(0,0,CW,CH);

  // background — deep space gradient
  const bg = cx.createRadialGradient(CW*.5,CH*.4,0,CW*.5,CH*.4,CW*.7);
  bg.addColorStop(0,'#0d0d26');
  bg.addColorStop(1,'#05050d');
  cx.fillStyle=bg; cx.fillRect(0,0,CW,CH);

  // subtle grid
  cx.save(); cx.globalAlpha=.03; cx.strokeStyle='#ffffff'; cx.lineWidth=1;
  for(let gx=0;gx<CW;gx+=40){cx.beginPath();cx.moveTo(gx,0);cx.lineTo(gx,CH);cx.stroke();}
  for(let gy=0;gy<CH;gy+=40){cx.beginPath();cx.moveTo(0,gy);cx.lineTo(CW,gy);cx.stroke();}
  cx.restore();

  // word background glow when word changes
  if (wordName) {
    const wg = cx.createRadialGradient(CW/2,CH*.85,0,CW/2,CH*.85,180);
    wg.addColorStop(0,'rgba(251,191,36,.08)');
    wg.addColorStop(1,'rgba(251,191,36,0)');
    cx.fillStyle=wg; cx.fillRect(0,0,CW,CH);
  }

  const lips  = frame.slice(0,40);
  const eyes  = frame.slice(40,56);
  const lh    = frame.slice(60,81);
  const rh    = frame.slice(81,102);
  const pose  = frame.slice(102,113);

  // ── trails ──
  if(rh[0]&&rh[0][0]!=null){ rhTrail.push([...rh[0]]); if(rhTrail.length>TRAIL_LEN) rhTrail.shift(); }
  if(lh[0]&&lh[0][0]!=null){ lhTrail.push([...lh[0]]); if(lhTrail.length>TRAIL_LEN) lhTrail.shift(); }
  trail(rhTrail, C.rg);
  trail(lhTrail, C.lg);

  // ── POSE / BODY ──
  // thick arm bones
  POSE_CONN.forEach(([i,j])=>bone(pose,i,j,C.p,5,.7));
  // shoulder line glow
  if(pose[5]&&pose[6]&&pose[5][0]!=null&&pose[6][0]!=null){
    const [ax,ay]=toScreen(pose[5][0],pose[5][1]);
    const [bx,by]=toScreen(pose[6][0],pose[6][1]);
    const sg=cx.createLinearGradient(ax,ay,bx,by);
    sg.addColorStop(0,C.l+'80'); sg.addColorStop(.5,C.p+'aa'); sg.addColorStop(1,C.r+'80');
    cx.save(); cx.beginPath(); cx.moveTo(ax,ay); cx.lineTo(bx,by);
    cx.strokeStyle=sg; cx.lineWidth=4; cx.globalAlpha=.6; cx.stroke(); cx.restore();
  }
  pose.slice(5).forEach(p=>{ joint(p,C.p2,7); glowDot(p,C.pg||'rgba(45,212,191,',12); });

  // ── FACE ──
  // lip outline with fill
  const vlips = lips.filter(p=>p&&p[0]!=null);
  if(vlips.length>8){
    const outer = vlips.slice(0,20);
    cx.save();
    cx.beginPath();
    const [fx,fy]=toScreen(outer[0][0],outer[0][1]);
    cx.moveTo(fx,fy);
    outer.slice(1).forEach(p=>{const[px,py]=toScreen(p[0],p[1]);cx.lineTo(px,py);});
    cx.closePath();
    cx.fillStyle='rgba(251,146,60,.2)'; cx.strokeStyle=C.face;
    cx.lineWidth=1.5; cx.globalAlpha=.8; cx.fill(); cx.stroke(); cx.restore();
  }
  // eyes — dots with glow
  eyes.forEach(p=>{ joint(p,C.eye,3,.9); });
  // eye glow centres (approx)
  if(eyes[0]) glowDot(eyes[0],'rgba(147,197,253,',10);
  if(eyes[8]) glowDot(eyes[8],'rgba(147,197,253,',10);

  // ── RIGHT HAND ──
  // bones with gradient-like effect (brighter at fingertips)
  HAND_CONN.forEach(([i,j])=>{
    const progress = Math.max(i,j)/20;
    const alpha = .6 + progress*.3;
    bone(rh,i,j,C.r,2.5,alpha);
  });
  // joints — size by importance
  rh.forEach((p,i)=>{
    const r = i===0?7:i%4===0?4:3;
    const col = i===0?C.r:C.r2;
    joint(p,col,r);
  });
  // wrist glow + fingertip dots
  if(rh[0]) glowDot(rh[0],C.rg,20);
  [4,8,12,16,20].forEach(i=>{ if(rh[i]) glowDot(rh[i],C.rg,8); });

  // ── LEFT HAND ──
  HAND_CONN.forEach(([i,j])=>{
    const progress = Math.max(i,j)/20;
    bone(lh,i,j,C.l,2.5,.6+progress*.3);
  });
  lh.forEach((p,i)=>{
    const r = i===0?7:i%4===0?4:3;
    joint(p,i===0?C.l:C.l2,r);
  });
  if(lh[0]) glowDot(lh[0],C.lg,20);
  [4,8,12,16,20].forEach(i=>{ if(lh[i]) glowDot(lh[i],C.lg,8); });

  // ── FRAME NUMBER (subtle) ──
  cx.save();
  cx.font='500 11px Syne,sans-serif';
  cx.fillStyle='rgba(255,255,255,.12)';
  cx.textAlign='right';
  cx.fillText('WESSAL · وصال', CW-16, CH-14);
  cx.restore();
}

function drawEmpty() {
  cx.clearRect(0,0,CW,CH);
  const bg=cx.createRadialGradient(CW*.5,CH*.5,0,CW*.5,CH*.5,CW*.6);
  bg.addColorStop(0,'#0d0d26'); bg.addColorStop(1,'#05050d');
  cx.fillStyle=bg; cx.fillRect(0,0,CW,CH);
  cx.save();
  cx.font='600 13px Syne,sans-serif';
  cx.fillStyle='rgba(255,255,255,.1)';
  cx.textAlign='center';
  cx.fillText('اكتب كلمة وشوف لغة الإشارة', CW/2, CH/2+6);
  cx.fillStyle='rgba(255,255,255,.06)';
  cx.font='40px serif';
  cx.fillText('🤟', CW/2, CH/2-30);
  cx.restore();
}
drawEmpty();

// ══════════════════════════════════════════════
//  ANIMATION
// ══════════════════════════════════════════════
let flat=[], ranges=[], curF=0, animH=null, lastT=0, ivl=1000/FPS, spd=1, playing=false;

function buildSeq(words) {
  flat=[]; ranges=[]; let cur=0;
  words.forEach(w=>{
    if(!SIGN_DICT[w]) return;
    const frames=SIGN_DICT[w].frames;
    ranges.push({w,start:cur,end:cur+frames.length-1});
    flat=flat.concat(frames); cur+=frames.length;
  });
}
function curWord(i){ for(const r of ranges) if(i>=r.start&&i<=r.end) return r.w; return ''; }

function loop(ts){
  if(!lastT) lastT=ts;
  if(ts-lastT >= ivl){
    lastT=ts-((ts-lastT)%ivl);
    if(curF < flat.length){
      const w = curWord(curF);
      drawFrame(flat[curF], w);

      // update UI
      document.getElementById('nowSign').textContent = w ? '🤟 '+w : '';
      document.querySelectorAll('.gw').forEach(el=>el.classList.toggle('active',el.dataset.w===w));

      const lbl=document.getElementById('wordLabel');
      if(w){ lbl.textContent=w.toUpperCase(); lbl.classList.add('show'); }
      else  { lbl.classList.remove('show'); }

      const pct=(curF+1)/flat.length*100;
      document.getElementById('pfill').style.width=pct+'%';
      document.getElementById('finfo').textContent=`FRAME ${curF+1} / ${flat.length}`;
      document.getElementById('tinfo').textContent=
        `${(curF/FPS).toFixed(2)}s / ${(flat.length/FPS).toFixed(2)}s`;
      curF++;
    } else {
      playing=false;
      document.getElementById('nowSign').textContent='✓ DONE';
      document.getElementById('wordLabel').classList.remove('show');
      document.querySelectorAll('.gw').forEach(el=>el.classList.remove('active'));
      document.getElementById('btnGo').disabled=false;
      return;
    }
  }
  animH=requestAnimationFrame(loop);
}

function startPlay(){
  rhTrail.length=0; lhTrail.length=0;
  if(animH) cancelAnimationFrame(animH);
  playing=true; lastT=0; ivl=(1000/FPS)/spd;
  animH=requestAnimationFrame(loop);
}
function stopAnim(){
  if(animH) cancelAnimationFrame(animH);
  playing=false;
  document.getElementById('btnGo').disabled=false;
}
function replay(){ curF=0; lastT=0; rhTrail.length=0; lhTrail.length=0; if(!playing) startPlay(); }
function setSpd(s){
  spd=s; ivl=(1000/FPS)/s;
  ['s1','s05','s2'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById(s===1?'s1':s===.5?'s05':'s2').classList.add('on');
}

// ══════════════════════════════════════════════
//  MAIN
// ══════════════════════════════════════════════
function go(){
  const raw=document.getElementById('inp').value.trim().toLowerCase();
  if(!raw){ toast('اكتب كلمة الأول!'); return; }
  const words=raw.split(/\s+/).filter(Boolean);
  const found=words.filter(w=>SIGN_DICT[w]);
  const miss=words.filter(w=>!SIGN_DICT[w]);
  if(!found.length){ toast('⚠️ مفيش كلمة في القاموس!'); return; }
  if(miss.length)    toast('⚠️ مش موجود: '+miss.join(', '));

  const strip=document.getElementById('glossStrip');
  strip.innerHTML='';
  words.forEach(w=>{
    const el=document.createElement('span');
    el.className='gw '+(SIGN_DICT[w]?'found':'miss');
    el.textContent=w; el.dataset.w=w; strip.appendChild(el);
  });

  buildSeq(found); curF=0;
  document.getElementById('btnGo').disabled=true;
  document.getElementById('btnRep').disabled=false;
  startPlay();
}

// chips
function buildUI(){
  const c=document.getElementById('chips');
  Object.keys(SIGN_DICT).forEach(w=>{
    const el=document.createElement('span'); el.className='chip'; el.textContent=w;
    el.onclick=()=>{
      const inp=document.getElementById('inp');
      inp.value=(inp.value.trim()?inp.value.trim()+' ':'')+w;
    };
    c.appendChild(el);
  });
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

buildUI();
</script>
